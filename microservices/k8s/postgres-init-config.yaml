apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: ecommerce
data:
  init.sql: |
    -- Create databases
    CREATE DATABASE IF NOT EXISTS product_db;
    CREATE DATABASE IF NOT EXISTS order_db;
    
    -- Product table
    CREATE TABLE IF NOT EXISTS product_db.product (
      id BIGSERIAL PRIMARY KEY,
      name VARCHAR(255) NOT NULL,
      description TEXT,
      price NUMERIC(10, 2) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Order table
    CREATE TABLE IF NOT EXISTS order_db.orders (
      id BIGSERIAL PRIMARY KEY,
      customer_name VARCHAR(255) NOT NULL,
      product_id BIGINT NOT NULL,
      quantity INT NOT NULL DEFAULT 1,
      status VARCHAR(50) DEFAULT 'PENDING',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Sample product data
    INSERT INTO product_db.product (name, description, price) VALUES
    ('Laptop', 'High-performance laptop', 999.99),
    ('Mouse', 'Wireless mouse', 29.99),
    ('Keyboard', 'Mechanical keyboard', 79.99)
    ON CONFLICT DO NOTHING;
