apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce

commonLabels:
  app.kubernetes.io/name: order-service
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/component: backend

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - hpa.yaml

images:
  - name: ecommerce-order-service
    newTag: latest

replicas:
  - name: order-service
    count: 2
