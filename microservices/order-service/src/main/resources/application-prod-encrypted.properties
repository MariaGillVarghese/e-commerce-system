# Server Configuration
server.port=8082
server.servlet.context-path=/api

# Database Configuration - PostgreSQL (Production with Encryption)
# Encrypted values for ecommerce_user / SecurePassword123! (generated with encryption key: "your-secret-key")
# To generate: jasypt encrypt input=ecommerce_user password=your-secret-key
# To generate: jasypt encrypt input=SecurePassword123! password=your-secret-key
spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=ENC(qU2rZ7lK3mN9pL5sX8vT0kJ2hG6fD4bE)
spring.datasource.password=ENC(dF5tK8mP2qR7xE0vC3nL9sJ4yH6bZ1wA)
spring.datasource.driver-class-name=org.postgresql.Driver

# Jasypt Configuration
jasypt.encryptor.algorithm=PBEWITHHMACSHA512ANDAES_256
jasypt.encryptor.key-obtention-iterations=1000
jasypt.encryptor.pool-size=1
jasypt.encryptor.provider-name=SunJCE

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Product Service Configuration
product.service.url=http://localhost:8081

# Logging
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
