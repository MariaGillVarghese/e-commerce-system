---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Deploy Nginx Reverse Proxy Configuration
  template:
    src: /workspace/ansible/reverseproxy/templates/nginx.conf.j2
    dest: /etc/nginx/conf.d/ecommerce_proxy.conf
  notify: restart nginx

- name: Remove default nginx configuration
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent

- name: Allow Nginx to connect to network (SELinux)
  seboolean:
    name: httpd_can_network_connect
    state: yes
    persistent: yes

- name: Ensure Nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes