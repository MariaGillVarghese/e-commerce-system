---
- name: Install OpenJDK and Maven
  dnf:
    name:
      - java-17-amazon-corretto-devel
      - maven
      - rsync
    state: present
  tags: build

- name: Ensure project directory exists
  file:
    path: "{{ project_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
  tags: deploy

- name: Copy e-commerce microservices source tree
  synchronize:
    src: "{{ playbook_dir }}/../../../microservices"
    dest: "{{ project_dir }}"
    rsync_opts:
      - --exclude=.git
  tags: deploy

- name: Build the Maven projects (skip tests)
  command: mvn clean package -DskipTests
  args:
    chdir: "{{ project_dir }}/microservices"
  become_user: ec2-user
  tags: build

- name: Create systemd unit for product-service
  copy:
    dest: /etc/systemd/system/product-service.service
    content: |
      [Unit]
      Description=Product Service
      After=network.target

      [Service]
      User=ec2-user
      WorkingDirectory={{ project_dir }}/microservices/product-service
      ExecStart=/usr/bin/java -jar {{ project_dir }}/microservices/product-service/target/product-service-1.0.0.jar
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  tags: services

- name: Create systemd unit for order-service
  copy:
    dest: /etc/systemd/system/order-service.service
    content: |
      [Unit]
      Description=Order Service
      After=network.target

      [Service]
      User=ec2-user
      WorkingDirectory={{ project_dir }}/microservices/order-service
      ExecStart=/usr/bin/java -jar {{ project_dir }}/microservices/order-service/target/order-service-1.0.0.jar
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  tags: services

- name: Create systemd unit for frontend-service
  copy:
    dest: /etc/systemd/system/frontend-service.service
    content: |
      [Unit]
      Description=Frontend Service
      After=network.target

      [Service]
      User=ec2-user
      WorkingDirectory={{ project_dir }}/microservices/frontend-service
      ExecStart=/usr/bin/java -jar {{ project_dir }}/microservices/frontend-service/target/frontend-service-1.0.0.war
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  tags: services

- name: Reload systemd to pick up new units
  systemd:
    daemon_reload: yes
  tags: services

- name: Enable services but do not start them
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: stopped
  loop:
    - product-service
    - order-service
    - frontend-service
  tags: services

- name: Set hostname for primary node
  hostname:
    name: e-commerce-ec2-1
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Set hostname for replica node
  hostname:
    name: e-commerce-ec2-2
  when: inventory_hostname == groups['postgres_replica'][0]
  become: yes
  tags: ha
  
- name: Ensure cluster hosts are in /etc/hosts
  become: yes
  blockinfile:
    path: /etc/hosts
    block: |
      {% for node in cluster_hosts %}
      {{ node.ip }} {{ node.host }}
      {% endfor %}
    create: yes
    marker: "# {mark} ANSIBLE CLUSTER HOSTS"

# --- HA / Pacemaker Setup ---
- name: Install HA packages
  dnf:
    name:
      - pacemaker
      - pcs
      - corosync
      - resource-agents
    state: present
  become: yes
  tags: ha

- name: Enable pcsd service
  systemd:
    name: pcsd
    state: started
    enabled: yes
  become: yes
  tags: ha

- name: Set hacluster password
  user:
    name: hacluster
    password: "{{ 'clusterpass' | password_hash('sha512') }}"
  become: yes
  tags: ha

- name: Authenticate cluster nodes
  command: >
    pcs host auth e-commerce-ec2-1 e-commerce-ec2-2 -u hacluster -p clusterpass
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Setup cluster (only if not exists)
  command: pcs cluster setup ecommerce-cluster e-commerce-ec2-1 e-commerce-ec2-2 --force
  register: cluster_setup
  failed_when: cluster_setup.rc != 0 and "'Cluster already exists' not in cluster_setup.stderr"
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Authenticate to local pcsd
  command: pcs client local-auth -u hacluster -p clusterpass
  become: yes
  tags: ha

- name: Start cluster
  command: pcs cluster start --all
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Enable cluster on boot
  command: pcs cluster enable --all
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Set resource stickiness
  command: pcs resource defaults update resource-stickiness=100
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

- name: Disable STONITH (optional for AWS)
  command: pcs property set stonith-enabled=false
  when: inventory_hostname == groups['postgres_primary'][0]
  become: yes
  tags: ha

# Systemd services managed by Pacemaker
- name: Add product-service resource (ignore if exists)
  command: pcs resource create product-service systemd:product-service
  become: yes
  ignore_errors: yes
  tags: ha

- name: Add order-service resource (ignore if exists)
  command: pcs resource create order-service systemd:order-service
  become: yes
  ignore_errors: yes
  tags: ha

- name: Add frontend-service resource (ignore if exists)
  command: pcs resource create frontend-service systemd:frontend-service
  become: yes
  ignore_errors: yes
  tags: ha

- name: Create Pacemaker resource group for e-commerce services
  command: pcs resource group add ecommerce-group product-service order-service frontend-service
  become: yes
  ignore_errors: yes

- name: Restart product service to pick up DB permissions
  systemd:
    name: product-service
    state: restarted
  become: yes
  tags: services

- name: Restart order service to pick up DB permissions
  systemd:
    name: order-service
    state: restarted
  become: yes
  tags: services

- name: Grant privileges to ecommerce_user
  community.postgresql.postgresql_privs:
    db: "{{ item.db }}"
    role: ecommerce_user
    objs: ALL_IN_SCHEMA
    type: table
    privs: ALL
    schema: public
    state: present
  become_user: postgres
  loop:
    - { db: product_db }
    - { db: order_db }
  tags: database

- name: Set ownership of public schema to ecommerce_user
  community.postgresql.postgresql_schema:
    name: public
    db: "{{ item }}"
    owner: ecommerce_user
    state: present
  become_user: postgres
  loop:
    - product_db
    - order_db
  tags: database

- name: Grant privileges on sequences to ecommerce_user
  community.postgresql.postgresql_privs:
    db: "{{ item }}"
    role: ecommerce_user
    type: sequence
    objs: ALL_IN_SCHEMA
    schema: public
    privs: USAGE,SELECT
    state: present
  become_user: postgres
  loop:
    - product_db
    - order_db
  tags: database